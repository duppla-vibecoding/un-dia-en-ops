<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200" width="150" height="200">
  <!-- Boss - Chibi Blocky Style (1.25x bigger than worker) -->

  <!-- Shadow -->
  <ellipse cx="75" cy="195" rx="35" ry="6" fill="rgba(0,0,0,0.2)"/>

  <!-- Legs -->
  <rect x="48" y="148" width="16" height="28" rx="5" fill="#1B2A4A"/>
  <rect x="86" y="148" width="16" height="28" rx="5" fill="#1B2A4A"/>
  <!-- Shoes (fancy) -->
  <rect x="44" y="172" width="24" height="12" rx="6" fill="#111"/>
  <rect x="82" y="172" width="24" height="12" rx="6" fill="#111"/>
  <!-- Shoe shine -->
  <rect x="48" y="174" width="12" height="3" rx="1" fill="#333"/>
  <rect x="86" y="174" width="12" height="3" rx="1" fill="#333"/>

  <!-- Body (dark suit) -->
  <rect x="38" y="100" width="74" height="54" rx="8" fill="#1B2A4A"/>
  <!-- Suit lapels -->
  <path d="M60 100 L75 118 L90 100" fill="none" stroke="#0D1B30" stroke-width="3"/>
  <!-- Shirt visible -->
  <rect x="66" y="100" width="18" height="30" fill="#ECEFF1"/>

  <!-- Red Tie -->
  <polygon points="75,102 69,128 75,138 81,128" fill="#D32F2F"/>
  <!-- Tie knot -->
  <rect x="71" y="100" width="8" height="6" rx="2" fill="#B71C1C"/>

  <!-- Suit buttons -->
  <circle cx="63" cy="130" r="2.5" fill="#0D1B30"/>
  <circle cx="87" cy="130" r="2.5" fill="#0D1B30"/>

  <!-- Arms -->
  <rect x="20" y="104" width="20" height="40" rx="8" fill="#1B2A4A"/>
  <rect x="110" y="104" width="20" height="40" rx="8" fill="#1B2A4A"/>
  <!-- Hands -->
  <circle cx="30" cy="148" r="9" fill="#FFCC99"/>
  <circle cx="120" cy="148" r="9" fill="#FFCC99"/>
  <!-- Cufflinks -->
  <circle cx="30" cy="138" r="3" fill="#FFD700"/>
  <circle cx="120" cy="138" r="3" fill="#FFD700"/>

  <!-- HEAD (big square - chibi) -->
  <rect x="15" y="2" width="120" height="102" rx="18" fill="#FFCC99"/>

  <!-- Hair (slicked back, executive) -->
  <rect x="15" y="-4" width="120" height="30" rx="14" fill="#222"/>
  <!-- Side hair -->
  <rect x="12" y="14" width="12" height="26" rx="5" fill="#222"/>
  <rect x="126" y="14" width="12" height="26" rx="5" fill="#222"/>
  <!-- Hair parting line -->
  <line x1="55" y1="0" x2="50" y2="22" stroke="#111" stroke-width="2"/>

  <!-- Eyes (bigger, intense) -->
  <circle cx="50" cy="52" r="18" fill="#FFFFFF"/>
  <circle cx="100" cy="52" r="18" fill="#FFFFFF"/>
  <!-- Pupils (looking at you) -->
  <circle cx="54" cy="54" r="9" fill="#333"/>
  <circle cx="104" cy="54" r="9" fill="#333"/>
  <!-- Eye shine -->
  <circle cx="48" cy="46" r="4.5" fill="#FFF"/>
  <circle cx="98" cy="46" r="4.5" fill="#FFF"/>

  <!-- Angry Eyebrows (V shape) -->
  <rect x="30" y="28" width="28" height="7" rx="3" fill="#222" transform="rotate(-15, 44, 31)"/>
  <rect x="92" y="28" width="28" height="7" rx="3" fill="#222" transform="rotate(15, 106, 31)"/>

  <!-- Mouth (frown / stern) -->
  <path d="M56 82 Q75 74 94 82" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>

  <!-- Glasses (optional executive look) -->
  <rect x="30" y="38" width="38" height="28" rx="6" fill="none" stroke="#555" stroke-width="2.5"/>
  <rect x="82" y="38" width="38" height="28" rx="6" fill="none" stroke="#555" stroke-width="2.5"/>
  <line x1="68" y1="52" x2="82" y2="52" stroke="#555" stroke-width="2"/>
</svg>