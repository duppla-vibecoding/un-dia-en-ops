// --- Round boosts (in-game projects — tension: processes vs investment) ---
const ROUND_BOOSTS = [
    { name: 'Cafe',          emoji: '\u2615', investTime: 8,  desc: 'Heal +100%\nresto del round',  color: 0x8B4513 },
    { name: 'Reporte',       emoji: '\u{1F4CB}', investTime: 10, desc: 'Velocidad +50%\nresto del round', color: 0x1F77B4 },

const BOOST_X = [130, 320, 510];
const BOOST_Y = 650;

// --- Utils ---
function fmtTime(s) { return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`; }
function hpColor(hp) { return hp > 60 ? 0x4CAF50 : hp > 30 ? 0xFFC107 : 0xF44336; }
function getComboTier(c) { return COMBO_TIERS.find(t => c >= t.min); }

function freshGameState() {
    return {
        round: 1, coins: 0, totalScore: 0, totalLost: 0, totalArrived: 0,
        upgrades: {}, roundStats: [],
    };
}

// --- Draw warm wood floor background ---
function drawWoodBackground(scene) {
    const gfx = scene.add.graphics().setDepth(0);
    // Solid warm tan/brown
    gfx.fillStyle(0xC4956A, 1);
    gfx.fillRect(0, 0, W, H);
    // Subtle floor board lines every 80px
    for (let y = 80; y < H; y += 80) {
        gfx.lineStyle(1, 0xA07850, 0.1);
        gfx.lineBetween(0, y, W, y);
    }
    // Very subtle vertical grain
    for (let x = 160; x < W; x += 160) {
        gfx.lineStyle(1, 0xA07850, 0.05);
        gfx.lineBetween(x, 0, x, H);
    }
    return gfx;
}

// --- Draw blocky pixel-art worker ---
function drawWorker(gfx, cx, cy, shirtColor, skinColor, hairColor, armOffset, shakeX) {
    const x = cx + (shakeX || 0);
    const y = cy;
    // Shadow
    gfx.fillStyle(0x000000, 0.2);
    gfx.fillEllipse(x, y + 26, 22, 6);
    // Body (shirt)
    gfx.fillStyle(shirtColor, 1);
    gfx.fillRect(x - 9, y - 6, 18, 22);
    // Arms
    gfx.fillStyle(shirtColor, 1);
    gfx.fillRect(x - 14, y - 4 + armOffset, 5, 14);
    gfx.fillRect(x + 9, y - 4 + armOffset, 5, 14);
    // Hands (skin)
    gfx.fillStyle(skinColor, 1);
    gfx.fillRect(x - 13, y + 10 + armOffset, 4, 4);
    gfx.fillRect(x + 10, y + 10 + armOffset, 4, 4);
    // Head
    gfx.fillStyle(skinColor, 1);
    gfx.fillRect(x - 9, y - 24, 18, 18);
    // Hair
    gfx.fillStyle(hairColor, 1);
    gfx.fillRect(x - 9, y - 29, 18, 5);
    // Eyes
    gfx.fillStyle(0x000000, 1);
    gfx.fillRect(x - 5, y - 18, 3, 3);
    gfx.fillRect(x + 3, y - 18, 3, 3);
}

// --- Draw boss character (larger) ---
function drawBoss(gfx, cx, cy, armOffset, comboHigh, faceRed) {
    const x = cx;
    const y = cy;
    // Shadow
    gfx.fillStyle(0x000000, 0.2);
    gfx.fillEllipse(x, y + 38, 34, 8);
    // Body (dark suit)
    gfx.fillStyle(0x1B2A4A, 1);
    gfx.fillRect(x - 14, y - 8, 28, 34);
    // Arms
    gfx.fillStyle(0x1B2A4A, 1);
    gfx.fillRect(x - 21, y - 5 + armOffset, 7, 22);
    gfx.fillRect(x + 14, y - 5 + armOffset, 7, 22);
    // Hands
    gfx.fillStyle(0xFFD5A0, 1);
    gfx.fillRect(x - 20, y + 17 + armOffset, 6, 5);
    gfx.fillRect(x + 15, y + 17 + armOffset, 6, 5);
    // Head
    const headColor = faceRed ? 0xFF6666 : 0xFFD5A0;
    gfx.fillStyle(headColor, 1);
    gfx.fillRect(x - 14, y - 36, 28, 28);
    // Hair
    gfx.fillStyle(0x333333, 1);
    gfx.fillRect(x - 14, y - 43, 28, 7);
    // Eyes
    gfx.fillStyle(0x000000, 1);
    gfx.fillRect(x - 8, y - 26, 4, 4);
    gfx.fillRect(x + 5, y - 26, 4, 4);
    // Angry eyebrows (angled lines)
    gfx.lineStyle(2, 0x000000, 1);
    gfx.lineBetween(x - 10, y - 32, x - 4, y - 30);
    gfx.lineBetween(x + 10, y - 32, x + 4, y - 30);
    // Mouth
    gfx.lineStyle(2, 0x000000, 0.6);
    gfx.lineBetween(x - 5, y - 14, x + 5, y - 14);
    // Tie
    gfx.fillStyle(0xCC0000, 1);
    gfx.fillRect(x - 2, y - 8, 4, 14);
    gfx.fillTriangle(x, y + 6, x - 4, y - 2, x + 4, y - 2);
}

// MENU SCENE

        drawWoodBackground(this);

        // Title area
        const titlePanel = this.add.graphics().setDepth(1);
        titlePanel.fillStyle(0x654321, 0.85);
        titlePanel.fillRoundedRect(W / 2 - 280, 30, 560, 120, 16);

        this.add.text(W / 2, 65, 'UN DIA EN OPS', {
            fontSize: '44px', fontFamily: 'Arial Black, Arial, sans-serif',
            color: '#FFD700', fontStyle: 'bold',
            stroke: '#1a1a1a', strokeThickness: 4
        }).setOrigin(0.5).setDepth(2);
        this.add.text(W / 2, 115, 'v2 — Factory Game — Duppla', {
            fontSize: '14px', fontFamily: 'Arial, sans-serif', color: '#D2B48C'
        }).setOrigin(0.5).setDepth(2);

        // Workers preview grid (same layout as game)
        const previewGfx = this.add.graphics().setDepth(1);
        const previewPositions = [
            { x: 170, y: 230 }, { x: 320, y: 230 }, { x: 470, y: 230 },
            { x: 245, y: 310 }, { x: 395, y: 310 },
        ];
        for (let i = 0; i < 5; i++) {
            const px = previewPositions[i].x;
            const py = previewPositions[i].y;
            // Small workstation
            previewGfx.fillStyle(0xB8D4E3, 1);
            previewGfx.fillRect(px - 30, py + 18, 60, 8);
            previewGfx.fillStyle(0x666666, 1);
            previewGfx.fillRect(px - 30, py + 26, 60, 2);
            // Small worker
            drawWorker(previewGfx, px, py, WORKER_SHIRTS[i], WORKER_SKINS[i], WORKER_HAIR[i], 0, 0);
            // Name
            this.add.text(px, py + 38, PROC_DATA[i].name, {
                fontSize: '9px', fontFamily: 'Arial, sans-serif', color: '#1a1a1a', fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(2);
        }

        // Rules panel
        const rulesPanel = this.add.graphics().setDepth(1);
        rulesPanel.fillStyle(0xFFFFFF, 0.5);
        rulesPanel.fillRoundedRect(W / 2 - 270, 380, 540, 190, 12);

        const rules = [
            '\u{1F3E5}  Click en ESTACIONES para restaurar su salud',
            '\u{1FA99}  Cada cliente exitoso = coins para la tienda',
            '\u{1F525}  Combo: clientes sin perder = multiplicador de coins',
            '\u{1F6D2}  Compra mejoras entre dias para sobrevivir',
            '',
            '\u25CF Normal (3 coins)   \u2605 VIP (5 coins)   ! Urgente (4 coins)',
            '',
            '8 dias  \u2022  90s cada uno  \u2022  Dificultad creciente  \u2022  ~15 min total',
        ];
        this.add.text(W / 2, 475, rules.join('\n'), {
            fontSize: '13px', fontFamily: 'Arial, sans-serif',
            color: '#333333', align: 'center', lineSpacing: 7
        }).setOrigin(0.5).setDepth(2);

        // Flywheel banner
        const fg = this.add.graphics().setDepth(1);
        fg.fillStyle(0x8B4513, 1); fg.fillRoundedRect(W / 2 - 270, 600, 540, 34, 8);
        fg.lineStyle(1, 0x654321, 1); fg.strokeRoundedRect(W / 2 - 270, 600, 540, 34, 8);
        this.add.text(W / 2, 617, '\u{1F504}  Mas exitos \u2192 Menor riesgo \u2192 Mejor tasa \u2192 Mas acceso \u2192 Loop', {
            fontSize: '11px', fontFamily: 'Arial, sans-serif', color: '#FFD700', fontStyle: 'italic'
        }).setOrigin(0.5).setDepth(2);

        this.makeBtn(W / 2, 700, 'JUGAR', () => {
            this.cameras.main.fadeOut(300, 0xC4, 0x95, 0x6A);
            this.time.delayedCall(300, () => {
                this.scene.start('GameScene', { gameState: freshGameState() });
            });
        });
        this.add.text(W / 2, 800, 'Un juego de empatia operativa — Duppla 2026', {
            fontSize: '10px', fontFamily: 'Arial, sans-serif', color: '#8B6847'
        }).setOrigin(0.5).setDepth(2);
    }

    makeBtn(x, y, label, fn) {
        const c = this.add.container(x, y).setDepth(3);
        const bg = this.add.graphics();
        const draw = (f, s) => {
            bg.clear(); bg.fillStyle(f, 1); bg.fillRoundedRect(-130, -30, 260, 60, 14);
            bg.lineStyle(3, s, 1); bg.strokeRoundedRect(-130, -30, 260, 60, 14);
        };
        draw(0x32CD32, 0x228B22);
        const t = this.add.text(0, 0, label, {
            fontSize: '24px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#1a1a1a', fontStyle: 'bold'
        }).setOrigin(0.5);
        c.add([bg, t]).setSize(260, 60).setInteractive({ useHandCursor: true });
        c.on('pointerover', () => { draw(0x3DE03D, 0x228B22); c.setScale(1.05); });
        c.on('pointerout', () => { draw(0x32CD32, 0x228B22); c.setScale(1); });
        c.on('pointerdown', fn);
    }
}

// ===================================================================
// GAME SCENE
// ===================================================================

class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }

    init(data) {
        this.gs = data.gameState;
        this.round = this.gs.round;

        this.procs = PROC_DATA.map(() => ({
            health: 100, queue: [], processProgress: 0,
            speedMult: 1, decayMult: 1, autoHealRate: 0, isFullAuto: false,
            frozen: false, frozenTimer: 0, lossTimer: 0,
        }));

        this.attending = -1;
        this.roundScore = 0;
        this.roundLost = 0;
        this.roundCoins = 0;
        this.roundArrived = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.timeLeft = ROUND_TIME;

        this.arrivalAccum = 0;
        this.eventAccum = 0;
        this.usedEvents = [];
        this.eventCount = 0;
        this.healMult = 1;
        this.healDebuffTimer = 0;
        this.healRateMult = 1;

        this.eventPaused = false;
        this.roundStarted = false;
        this.ended = false;

        this.prevComboTier = getComboTier(0);
        this.bossFaceRedTimer = 0;

        // Round boosts (in-game projects)
        this.investing = -1;
        this.boostState = ROUND_BOOSTS.map(() => ({ progress: 0, done: false }));
        this.boostHealMult = 1;
        this.boostSpeedMult = 1;
        this.boostDecayMult = 1;

        this.applyUpgrades();
    }

    applyUpgrades() {
        const u = this.gs.upgrades;
        if (u.app) this.procs[0].autoHealRate = 2;
        if (u.dashboard) this.procs[1].speedMult *= 0.6;
        if (u.protocolo) this.procs[2].speedMult *= 0.6;
        if (u.debito) this.procs[3].autoHealRate = 3;
        if (u.script) this.procs[3].speedMult *= 0.6;
        if (u.capacita) this.healRateMult = 1.5;
        if (u.gestion) { for (const p of this.procs) p.decayMult *= 0.7; }
        if (u.auto) {
            const order = [0, 2, 3, 4, 1];
            for (const i of order) {
                if (!this.procs[i].isFullAuto) {
                    this.procs[i].isFullAuto = true;
                    this.procs[i].autoHealRate = Math.max(this.procs[i].autoHealRate, 2);
                    break;
                }
            }
        }
    }

    create() {
        this.cameras.main.fadeIn(400, 0xC4, 0x95, 0x6A);

        // Wood background
        drawWoodBackground(this);

        // Red vignette overlay for client loss
        this.vignetteGfx = this.add.graphics().setDepth(85).setAlpha(0);
        this.drawVignette();

        // Golden tint overlay for x3 combo
        this.goldenTint = this.add.rectangle(W / 2, H / 2, W, H, 0xffd700, 0).setDepth(1);

        this.createHUD();
        this.createBoss();
        this.createPipeline();
        this.createBoostPanel();
        this.createEventOverlay();
        this.createRoundStartOverlay();
    }

    // Draw vignette (red edges)
    drawVignette() {
        const g = this.vignetteGfx;
        g.clear();
        g.fillGradientStyle(0xff0000, 0xff0000, 0xff0000, 0xff0000, 0.6, 0.6, 0, 0);
        g.fillRect(0, 0, W, 60);
        g.fillGradientStyle(0xff0000, 0xff0000, 0xff0000, 0xff0000, 0, 0, 0.6, 0.6);
        g.fillRect(0, H - 60, W, 60);
        g.fillGradientStyle(0xff0000, 0xff0000, 0xff0000, 0xff0000, 0.6, 0, 0, 0.6);
        g.fillRect(0, 0, 60, H);
        g.fillGradientStyle(0xff0000, 0xff0000, 0xff0000, 0xff0000, 0, 0.6, 0.6, 0);
        g.fillRect(W - 60, 0, 60, H);
    }

    // ---- HUD (Top bar) ----
    createHUD() {
        const hud = this.add.graphics().setDepth(40);
        // Dark brown bar
        hud.fillStyle(0x654321, 1); hud.fillRect(0, 0, W, 60);
        hud.lineStyle(2, 0x8B4513, 1); hud.lineBetween(0, 60, W, 60);

        // Stat background pills
        const hudPills = this.add.graphics().setDepth(40);
        const pillPositions = [
            { x: 60, w: 100 },   // Timer
            { x: 180, w: 100 },  // Coins
            { x: 310, w: 90 },   // Score
            { x: 420, w: 90 },   // Combo
            { x: 555, w: 100 },  // Dia
        ];
        pillPositions.forEach(p => {
            hudPills.fillStyle(0x8B6847, 0.6);
            hudPills.fillRoundedRect(p.x - p.w / 2, 5, p.w, 50, 8);
        });

        const mkL = (x, t) => this.add.text(x, 10, t, {
            fontSize: '9px', fontFamily: 'Arial, sans-serif', color: '#C4956A', letterSpacing: 1
        }).setOrigin(0.5).setDepth(41);

        mkL(60, 'TIEMPO');
        this.timerTxt = this.add.text(60, 36, fmtTime(ROUND_TIME), {
            fontSize: '20px', fontFamily: 'monospace', color: '#FFFFFF', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(41);

        mkL(180, 'COINS');
        this.coinsTxt = this.add.text(180, 36, '\u{1FA99} ' + this.gs.coins, {
            fontSize: '16px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#FFD700', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(41);

        mkL(310, 'EXITOSOS');
        this.scoreTxt = this.add.text(310, 36, '0', {
            fontSize: '20px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#4CAF50', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(41);

        mkL(420, 'COMBO');
        this.comboTxt = this.add.text(420, 36, 'x1', {
            fontSize: '18px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#FFFFFF', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(41);

    // ---- Interaction ----

        }
        this.attending = i;
        this.investing = -1;
    }

    clickBoost(j) {
        if (this.eventPaused || !this.roundStarted) return;
        if (this.boostState[j].done) {
            this.floatText(BOOST_X[j], BOOST_Y - 35, '\u2705 ACTIVO', '#4caf50');
            return;
        }
        this.investing = j;
        this.attending = -1;
    }

    completeBoost(j) {
        const bs = this.boostState[j];
        bs.done = true;
        bs.progress = ROUND_BOOSTS[j].investTime;

        if (j === 0) this.boostHealMult = 2;       // Cafe: heal +100%
        if (j === 1) this.boostSpeedMult = 0.6;     // Reporte: speed +50% (0.6x time)
        if (j === 2) this.boostDecayMult = 0.5;     // Coordinacion: decay -50%

        this.floatText(BOOST_X[j], BOOST_Y - 35, '\u2705 ' + ROUND_BOOSTS[j].name + '!', '#4caf50');
        this.cameras.main.flash(200, 76, 175, 80, false);

        this.investing = -1;
    }

    // ---- Game logic helpers ----
    getArrivalInterval() {
        const base = 7.0 - (this.round - 1) * 0.55;
        return Math.max(2.5, base + Phaser.Math.FloatBetween(-0.4, 0.4));
    }

    getClientType() {
        const r = Math.random();
        if (this.round >= 5 && r < 0.18) return 'urgente';
        if (this.round >= 3 && r < 0.32) return 'vip';
        return 'normal';
    }

    getEventInterval() {
        if (this.round <= 2) return Infinity;
        if (this.round <= 4) return 75;
        if (this.round <= 6) return 38;
        return 26;
    }

    getDecayScale() { return 1 + (this.round - 1) * 0.08; }

    addClientsTo(procIdx, count) {
        for (let i = 0; i < count; i++) {
            if (this.procs[procIdx].queue.length < CLIENT_MAX) {
                this.procs[procIdx].queue.push({ type: 'normal', age: 0 });
                this.bounceQueueDot(procIdx);
            }
        }
        this.flashStation(procIdx);
    }

    addClientOfType(procIdx, type) {
        if (this.procs[procIdx].queue.length < CLIENT_MAX) {
            this.procs[procIdx].queue.push({ type, age: 0 });
            this.bounceQueueDot(procIdx);
        }
    }

    bounceQueueDot(procIdx) {
        const pos = PROC_POS[procIdx];
        const bounce = this.add.rectangle(pos.x, pos.y + 44, 10, 10, 0xFF6B35, 0.5).setDepth(16);
        this.tweens.add({
            targets: bounce, scaleX: 1.5, scaleY: 1.5, alpha: 0, duration: 300, ease: 'Power2',
            onComplete: () => bounce.destroy()
        });
    }

    freezeProc(idx, dur) {
        this.procs[idx].frozen = true;
        this.procs[idx].frozenTimer = dur;
        if (this.attending === idx) { this.attending = -1; }
        this.flashStation(idx);
    }

    // ---- Process update ----
    updateProcess(i, dt) {
        const p = this.procs[i];
        const data = PROC_DATA[i];
        const dScale = this.getDecayScale();

        // Health
        if (this.attending === i) {
            p.health = Math.min(100, p.health + HEAL_RATE * this.healMult * this.healRateMult * this.boostHealMult * dt);
        } else {
            if (p.autoHealRate > 0) p.health = Math.min(100, p.health + p.autoHealRate * dt);
            const pressure = (1 + p.queue.length * 0.12);
            p.health = Math.max(0, p.health - data.decay * p.decayMult * this.boostDecayMult * pressure * dScale * dt);
        }

        // Frozen
        if (p.frozen) {
            p.frozenTimer -= dt;
            if (p.frozenTimer <= 0) { p.frozen = false; p.frozenTimer = 0; }
            return;
        }

        // Processing
        let hf;
        if (p.health > 50) hf = 1;
        else if (p.health > 25) hf = 0.5 + (p.health - 25) / 50;
        else hf = 0;

        const autoBoost = (p.isFullAuto && this.attending !== i) ? 0.6 : 0;
        const attendBoost = (this.attending === i) ? 1.3 : 0;
        const speed = Math.max(attendBoost, autoBoost);

        if (hf > 0 && p.queue.length > 0 && speed > 0) {
            const et = data.processTime * p.speedMult * this.boostSpeedMult * CLIENT_TYPES[p.queue[0].type].timeMult;
            p.processProgress += (dt * speed * hf) / et;

            while (p.processProgress >= 1 && p.queue.length > 0) {
                p.processProgress -= 1;
                const client = p.queue.shift();
                if (i < 4) {
                    if (this.procs[i + 1].queue.length < CLIENT_MAX) {
                        this.procs[i + 1].queue.push({ type: client.type, age: 0 });
                        this.transferAnim(i, i + 1, client.type);
                    } else {
                        this.clientLost(i + 1);
                    }
                } else {
                    this.clientSuccess(client.type);
                }
            }
        }

        // Client aging
        for (let j = p.queue.length - 1; j >= 0; j--) {
            p.queue[j].age += dt * CLIENT_TYPES[p.queue[j].type].ageMult;
            if (p.queue[j].age >= CLIENT_EXPIRY) {
                p.queue.splice(j, 1);
                this.clientLost(i);
            }
        }

        // Client loss when process dead
        if (p.health <= 0 && p.queue.length > 0) {
            p.lossTimer += dt;
            if (p.lossTimer >= LOSS_INTERVAL) {
                p.queue.shift();
                p.lossTimer = 0;
                this.clientLost(i);
            }
        } else {
            p.lossTimer = 0;
        }
    }

    clientSuccess(type) {
        const tier = getComboTier(this.combo);
        const coins = Math.round(CLIENT_TYPES[type].value * tier.mult);
        this.gs.coins += coins;
        this.roundCoins += coins;
        this.roundScore++;
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
        this.exitAnim(type);
        this.floatText(PROC_POS[4].x, PROC_POS[4].y - 80, '\u26A1 +' + coins + '\u{1FA99}', '#228B22');

        this.successParticleBurst(type);

        const newTier = getComboTier(this.combo);
        if (newTier.mult > tier.mult) {
            this.cameras.main.flash(150, 255, 200, 50, false);
            this.tweens.add({
                targets: this.comboTxt, scaleX: 1.6, scaleY: 1.6, duration: 150,
                yoyo: true, ease: 'Back.easeOut'
            });
        }
    }

    successParticleBurst(type) {
        const pos = PROC_POS[4];
        const exitX = pos.x + PROC_W / 2 + 10;
        const exitY = pos.y;
        const confettiColors = [0xFF6B35, 0xFFD700, 0x32CD32, 0x1F77B4, 0xFF4444, 0x00CED1];
        const count = Phaser.Math.Between(10, 16);
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Phaser.Math.FloatBetween(-0.3, 0.3);
            const dist = Phaser.Math.Between(30, 70);
            const size = Phaser.Math.Between(4, 8);
            const color = confettiColors[Phaser.Math.Between(0, confettiColors.length - 1)];
            const particle = this.add.rectangle(exitX, exitY, size, size, color, 1).setDepth(50);
            particle.setAngle(Phaser.Math.Between(0, 360));
            this.tweens.add({
                targets: particle,
                x: exitX + Math.cos(angle) * dist,
                y: exitY + Math.sin(angle) * dist + 20,
                alpha: 0, scaleX: 0.2, scaleY: 0.2,
                angle: particle.angle + Phaser.Math.Between(-180, 180),
                duration: 600, ease: 'Power2',
                onComplete: () => particle.destroy()
            });
        }
    }

    clientLost(procIdx) {
        this.roundLost++;
        this.gs.totalLost++;
        if (this.combo > 0) {
            this.combo = 0;
            this.cameras.main.flash(150, 200, 50, 50, false);
        }
        this.floatText(PROC_POS[procIdx].x, PROC_POS[procIdx].y - 80, '\u{1F480} -1', '#CC0000');

        // Boss face turns red briefly
        this.bossFaceRedTimer = 0.5;

        // Orange sparks on loss
        const pos = PROC_POS[procIdx];
        for (let i = 0; i < 6; i++) {
            const spark = this.add.rectangle(
                pos.x + Phaser.Math.Between(-20, 20),
                pos.y + Phaser.Math.Between(-20, 20),
                3, 3, 0xFF6B35, 1
            ).setDepth(50);
            this.tweens.add({
                targets: spark,
                x: spark.x + Phaser.Math.Between(-30, 30),
                y: spark.y + Phaser.Math.Between(-40, -10),
                alpha: 0, duration: 400, ease: 'Power2',
                onComplete: () => spark.destroy()
            });
        }

        // Red vignette flash
        this.vignetteGfx.setAlpha(0.6);
        this.tweens.add({
            targets: this.vignetteGfx, alpha: 0, duration: 400, ease: 'Power2'
        });
        this.cameras.main.shake(200, 0.004);
    }

    // ---- Events (Factory Alarm) ----
    triggerEvent() {
        let avail = EVENTS.map((_, i) => i).filter(i => !this.usedEvents.includes(i));
        if (!avail.length) { this.usedEvents = []; avail = EVENTS.map((_, i) => i); }
        const idx = Phaser.Utils.Array.GetRandom(avail);
        this.usedEvents.push(idx);
        this.eventCount++;
        const evt = EVENTS[idx];

        this.eventPaused = true;
        this.evtTimeout = 8;

        this.evtOvl.setVisible(true).setAlpha(0);
        this.tweens.add({ targets: this.evtOvl, alpha: 0.7, duration: 200 });

        // Red glow behind
        this.evtGlowGfx.clear();
        this.evtGlowGfx.fillStyle(0xff0000, 0.15);
        this.evtGlowGfx.fillRoundedRect(W / 2 - 230, H / 2 - 130, 460, 260, 24);
        this.evtGlowGfx.fillStyle(0xff0000, 0.08);
        this.evtGlowGfx.fillRoundedRect(W / 2 - 245, H / 2 - 145, 490, 290, 30);
        this.evtGlowGfx.setAlpha(0);
        this.tweens.add({ targets: this.evtGlowGfx, alpha: 1, duration: 300 });

        // Yellow warning card
        this.evtGfx.clear();
        this.evtGfx.fillStyle(0xFFD700, 1); this.evtGfx.fillRoundedRect(W / 2 - 210, H / 2 - 110, 420, 220, 16);
        this.evtBorderGfx.clear();
        this.evtBorderGfx.lineStyle(4, 0xFF0000, 1); this.evtBorderGfx.strokeRoundedRect(W / 2 - 210, H / 2 - 110, 420, 220, 16);
        this.evtBorderGfx.setAlpha(1);
        this.tweens.add({
            targets: this.evtBorderGfx, alpha: 0.4, duration: 400,
            yoyo: true, repeat: -1
        });

        this.evtTitle.setText('\u{1F6A8} ' + evt.title).setPosition(W / 2, H / 2 - 180).setVisible(true).setAlpha(0);
        this.evtTitle.setColor('#1a1a1a');
        this.evtBody.setText(evt.text).setPosition(W / 2, H / 2 - 140).setVisible(true).setAlpha(0);
        this.evtBody.setColor('#333333');

        this.tweens.add({
            targets: this.evtTitle,
            y: H / 2 - 70, alpha: 1, duration: 300, ease: 'Back.easeOut'
        });
        this.tweens.add({
            targets: this.evtBody,
            y: H / 2 - 30, alpha: 1, duration: 300, ease: 'Back.easeOut', delay: 50
        });

        const canAffordB = evt.optB.cost === undefined || evt.optB.cost === 0 || this.gs.coins >= evt.optB.cost;

        this.evtBtnA = this.makeEvtBtn(W / 2 - 100, H / 2 + 40, evt.optA.label, evt.optA.desc, true, 'green', () => {
            evt.optA.apply(this);
            this.dismissEvent();
        });

        const bDesc = evt.optB.cost ? evt.optB.desc + ' (\u{1F4B0}' + evt.optB.cost + ')' : evt.optB.desc;
        this.evtBtnB = this.makeEvtBtn(W / 2 + 100, H / 2 + 40, evt.optB.label, bDesc, canAffordB, 'orange', () => {
            if (!canAffordB) return;
            if (evt.optB.cost) this.gs.coins -= evt.optB.cost;
            evt.optB.apply(this);
            this.dismissEvent();
        });

        this.cameras.main.shake(200, 0.005);
    }

    makeEvtBtn(x, y, label, desc, enabled, style, fn) {
        const els = [];
        const g = this.add.graphics().setDepth(93);
        let bgColor, brdColor;
        if (!enabled) {
            bgColor = 0x999999; brdColor = 0x666666;
        } else if (style === 'green') {
            bgColor = 0x32CD32; brdColor = 0x228B22;
        } else {
            bgColor = 0xFFA500; brdColor = 0xCC8400;
        }
        g.fillStyle(bgColor, 1); g.fillRoundedRect(x - 90, y - 30, 180, 60, 8);
        g.lineStyle(2, brdColor, 1); g.strokeRoundedRect(x - 90, y - 30, 180, 60, 8);
        els.push(g);
        const t1 = this.add.text(x, y - 10, label, {
            fontSize: '14px', fontFamily: 'Arial Black, Arial, sans-serif',
            color: enabled ? '#1a1a1a' : '#555555', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(94);
        els.push(t1);
        const t2 = this.add.text(x, y + 12, desc, {
            fontSize: '9px', fontFamily: 'Arial, sans-serif',
            color: enabled ? '#333333' : '#666666', align: 'center'
        }).setOrigin(0.5).setDepth(94);
        els.push(t2);
        if (enabled) {
            const zone = this.add.zone(x, y, 180, 60).setInteractive({ useHandCursor: true }).setDepth(95);
            zone.on('pointerdown', fn);
            els.push(zone);
            const hoverGfx = this.add.graphics().setDepth(93).setAlpha(0);
            hoverGfx.fillStyle(0xFFFFFF, 0.25); hoverGfx.fillRoundedRect(x - 90, y - 30, 180, 60, 8);
            els.push(hoverGfx);
            zone.on('pointerover', () => { hoverGfx.setAlpha(1); t1.setScale(1.05); t2.setScale(1.05); });
            zone.on('pointerout', () => { hoverGfx.setAlpha(0); t1.setScale(1); t2.setScale(1); });
        }
        return els;
    }

    dismissEvent() {
        this.evtOvl.setVisible(false);
        this.evtGfx.clear();
        this.evtGlowGfx.clear();
        this.evtGlowGfx.setAlpha(0);
        this.evtBorderGfx.clear();
        this.tweens.killTweensOf(this.evtBorderGfx);
        this.evtTitle.setVisible(false);
        this.evtBody.setVisible(false);
        if (this.evtBtnA) { this.evtBtnA.forEach(e => e.destroy()); this.evtBtnA = null; }
        if (this.evtBtnB) { this.evtBtnB.forEach(e => e.destroy()); this.evtBtnB = null; }
        this.eventPaused = false;
    }

    // ---- Visuals ----
    floatText(x, y, text, color) {
        const t = this.add.text(x, y, text, {
            fontSize: '15px', fontFamily: 'Arial Black, Arial, sans-serif',
            color, stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5).setDepth(50);
        this.tweens.add({ targets: t, y: y - 35, alpha: 0, duration: 500, ease: 'Power2', onComplete: () => t.destroy() });
    }

    flashStation(idx) {
        const pos = PROC_POS[idx];
        const fl = this.add.rectangle(pos.x, pos.y, PROC_W, PROC_H, 0xffffff, 0.25).setDepth(80);
        this.tweens.add({ targets: fl, alpha: 0, duration: 500, onComplete: () => fl.destroy() });
    }

    transferAnim(from, to, type) {
        const fromPos = PROC_POS[from];
        const toPos = PROC_POS[to];
        const sq = this.add.rectangle(fromPos.x, fromPos.y + 22, 8, 8, CLIENT_TYPES[type].color).setDepth(50);
        this.tweens.add({
            targets: sq, x: toPos.x, y: toPos.y + 22, duration: 350, ease: 'Power2',
            onComplete: () => sq.destroy()
        });
    }

    exitAnim(type) {
        const pos = PROC_POS[4];
        const startX = pos.x + PROC_W / 2;
        const startY = pos.y;
        const sq = this.add.rectangle(startX, startY, 8, 8, CLIENT_TYPES[type].color).setDepth(50);
        this.tweens.add({
            targets: sq, x: W + 30, y: startY - 80, alpha: 0,
            duration: 450, ease: 'Power2',
            onComplete: () => sq.destroy()
        });
    }

    drawStations() {
        const time = this.time.now;

        for (let i = 0; i < 5; i++) {
            const g = this.stGfx[i];
            const p = this.procs[i];
            const pos = PROC_POS[i];
            const x = pos.x;
            const y = pos.y;
            const hw = PROC_W / 2, hh = PROC_H / 2;
            g.clear();

            const att = this.attending === i;
            const danger = p.health < 25 && !p.frozen;

            // --- Station glow (selected = green highlight) ---
            const glowG = this.stGlow[i];
            glowG.clear();
            if (att) {
                glowG.fillStyle(0x00FF7F, 0.2);
                glowG.fillRoundedRect(x - hw - 6, y - hh - 6, PROC_W + 12, PROC_H + 12, 10);
            } else if (danger) {
                const pulseAlpha = 0.1 + Math.sin(time / 200) * 0.1;
                glowG.lineStyle(3, 0xFF0000, pulseAlpha + 0.3);
                glowG.strokeRoundedRect(x - hw - 4, y - hh - 4, PROC_W + 8, PROC_H + 8, 10);
            } else if (p.frozen) {
                glowG.fillStyle(0x29b6f6, 0.15);
                glowG.fillRoundedRect(x - hw - 4, y - hh - 4, PROC_W + 8, PROC_H + 8, 10);
            }

            // --- Workstation base (desk/conveyor) ---
            const deskY = y + 28;
            g.fillStyle(0xB8D4E3, 1);
            g.fillRect(x - 60, deskY, 120, 16);
            g.fillStyle(0x666666, 1);
            g.fillRect(x - 60, deskY + 16, 120, 3);

            // --- Worker character ---
            const isProcessing = p.queue.length > 0 && p.health > 25 && !p.frozen;
            let armOffset = 0;
            let shakeX = 0;

            if (att && isProcessing) {
                // Fast arm animation when attended
                armOffset = Math.sin(time / 150) * 6;
            } else if (isProcessing) {
                // Slow arm animation
                armOffset = Math.sin(time / 300) * 4;
            } else if (this.investing >= 0) {
                // All workers stop when investing
                armOffset = 0;
            }

            // Shake when low health
            if (p.health < 25 && p.health > 0 && !p.frozen) {
                shakeX = Math.sin(time / 50) * 2;
            }

            // Frozen blue tint - draw worker slightly differently
            if (p.frozen) {
                // Blue-tinted worker
                drawWorker(g, x, y - 4, 0x6699CC, 0xAABBDD, 0x556688, 0, 0);
            } else {
                drawWorker(g, x, y - 4, WORKER_SHIRTS[i], WORKER_SKINS[i], WORKER_HAIR[i], armOffset, shakeX);
            }

            // --- Vertical health bars (Make More style!) ---
            const barW = 10, barH = 100;
            const barX1 = x - hw + 2;
            const barX2 = x + hw - 12;
            const barTopY = y - hh + 10;

            // Left bar
            g.fillStyle(0x333333, 1);
            g.fillRect(barX1, barTopY, barW, barH);
            if (p.health > 0) {
                const fillH = barH * (p.health / 100);
                g.fillStyle(hpColor(p.health), 1);
                g.fillRect(barX1, barTopY + barH - fillH, barW, fillH);
                // Highlight
                g.fillStyle(0xFFFFFF, 0.2);
                g.fillRect(barX1, barTopY + barH - fillH, barW / 3, fillH);
            }
            g.lineStyle(1, 0x555555, 0.5);
            g.strokeRect(barX1, barTopY, barW, barH);

            // Right bar
            g.fillStyle(0x333333, 1);
            g.fillRect(barX2, barTopY, barW, barH);
            if (p.health > 0) {
                const fillH = barH * (p.health / 100);
                g.fillStyle(hpColor(p.health), 1);
                g.fillRect(barX2, barTopY + barH - fillH, barW, fillH);
                g.fillStyle(0xFFFFFF, 0.2);
                g.fillRect(barX2, barTopY + barH - fillH, barW / 3, fillH);
            }
            g.lineStyle(1, 0x555555, 0.5);
            g.strokeRect(barX2, barTopY, barW, barH);

            // Auto-heal indicator on right bar
            if (p.autoHealRate > 0) {
                g.fillStyle(0x00FF7F, 0.8); g.fillCircle(barX2 + barW / 2, barTopY - 6, 4);
            }

            // --- Processing mini-bar ---
            if (p.health > 25 && p.queue.length > 0 && !p.frozen) {
                const pW = 80;
                g.fillStyle(0x333333, 1); g.fillRect(x - pW / 2, deskY + 22, pW, 3);
                g.fillStyle(0xFF6B35, 1); g.fillRect(x - pW / 2, deskY + 22, pW * Math.min(1, p.processProgress), 3);
            }

            // --- Client queue as small colored squares on desk ---
            if (p.queue.length > 0) {
                const maxDots = Math.min(p.queue.length, 8);
                const dotSpacing = 14;
                const startX = x - ((maxDots - 1) * dotSpacing) / 2;
                for (let j = 0; j < maxDots; j++) {
                    const c = p.queue[j];
                    g.fillStyle(CLIENT_TYPES[c.type].color, j === 0 ? 1 : 0.7);
                    const sqSize = j === 0 ? 10 : 8;
                    g.fillRect(startX + j * dotSpacing - sqSize / 2, deskY + 3 - sqSize / 2, sqSize, sqSize);
                }
            }

            // --- Process name below workstation ---
            // Drawn as static text in create, but we need to draw it fresh
            // Use the graphics object to add text-like label below
            // (We'll use a dedicated text object approach below)

            // --- Client count badge at top-right ---
            if (p.queue.length > 0) {
                const cx = x + hw - 14, cy = y - hh + 14;
                g.fillStyle(p.queue.length >= 6 ? 0xFF0000 : 0xFF6B35, 1);
                g.fillCircle(cx, cy, 12);
                this.stCount[i].setText(String(p.queue.length)).setPosition(cx, cy).setVisible(true);
            } else {
                this.stCount[i].setVisible(false);
            }

            // Status text
            if (p.frozen) this.stStatus[i].setText('\u2744\uFE0F CONGELADO ' + Math.ceil(p.frozenTimer) + 's').setColor('#29b6f6').setVisible(true);
            else if (p.isFullAuto) this.stStatus[i].setText('\u{1F916} AUTO').setColor('#9c27b0').setVisible(true);
            else if (p.health <= 0 && p.queue.length > 0) this.stStatus[i].setText('\u{1F480} MUERTO').setColor('#FF0000').setVisible(true);
            else if (p.health < 25) this.stStatus[i].setText('\u26A0\uFE0F PELIGRO').setColor('#FF4444').setVisible(true);
            else if (p.autoHealRate > 0 && this.attending !== i) this.stStatus[i].setText('\u{1F49A} auto-heal').setColor('#00FF7F').setVisible(true);
            else this.stStatus[i].setVisible(false);
        }

        // Draw station names (only once, but since we redraw every frame with graphics, use text objects)
        if (!this._stationLabels) {
            this._stationLabels = [];
            for (let i = 0; i < 5; i++) {
                const pos = PROC_POS[i];
                const label = this.add.text(pos.x, pos.y + hh + 4, PROC_DATA[i].name, {
                    fontSize: '12px', fontFamily: 'Arial, sans-serif', color: '#1a1a1a', fontStyle: 'bold'
                }).setOrigin(0.5).setDepth(10);
                this._stationLabels.push(label);
            }
        }
    }

    drawBoosts() {
        for (let j = 0; j < 3; j++) {
            const g = this.boostGfx[j];
            const bs = this.boostState[j];
            const data = ROUND_BOOSTS[j];
            const x = BOOST_X[j];
            g.clear();

            const inv = this.investing === j;
            const done = bs.done;

            let bg, brd, bw;
            if (done) { bg = 0x4CAF50; brd = 0x228B22; bw = 3; }
            else if (inv) { bg = 0xFF6B35; brd = 0xFF6B35; bw = 3; }
            else {
                bg = data.color; brd = 0x654321; bw = 2;
            }

            const pw = BOOST_W / 2, ph = BOOST_H / 2;
            g.fillStyle(bg, 1); g.fillRoundedRect(x - pw, BOOST_Y - ph, BOOST_W, BOOST_H, 10);
            g.lineStyle(bw, brd, 1); g.strokeRoundedRect(x - pw, BOOST_Y - ph, BOOST_W, BOOST_H, 10);

            // Progress bar
            if (!done) {
                const barY = BOOST_Y + ph - 12, barW = BOOST_W - 16, barH = 5;
                g.fillStyle(0x333333, 0.5); g.fillRoundedRect(x - barW / 2, barY, barW, barH, 2);
                const ratio = bs.progress / data.investTime;
                if (ratio > 0) {
                    g.fillStyle(inv ? 0xFFD700 : 0x999999, 1);
                    g.fillRoundedRect(x - barW / 2, barY, barW * ratio, barH, 2);
                }
            }

            this.boostDoneTxt[j].setVisible(done);
        }
    }

    // ---- Main update ----
    update(_, delta) {
        delta = Math.min(delta, 100);
        const dt = delta / 1000;

        // Boss face red timer
        if (this.bossFaceRedTimer > 0) this.bossFaceRedTimer -= dt;

        if (!this.roundStarted) {
            this.drawBossArea();
            return;
        }

        // Event pause — processes STILL decay during events!
        if (this.eventPaused) {
            this.evtTimeout -= dt;
            if (this.evtTimeout <= 0) {
                const evtIdx = this.usedEvents[this.usedEvents.length - 1];
                EVENTS[evtIdx].optA.apply(this);
                this.dismissEvent();
            }
            for (let i = 0; i < 5; i++) {
                const p = this.procs[i];
                if (p.autoHealRate > 0) p.health = Math.min(100, p.health + p.autoHealRate * dt);
                const pressure = (1 + p.queue.length * 0.12);
                p.health = Math.max(0, p.health - PROC_DATA[i].decay * p.decayMult * pressure * this.getDecayScale() * dt);
            }
            this.drawStations(); this.drawBoosts(); this.drawBossArea();
            return;
        }

        // Timer
        this.timeLeft -= dt;
        if (this.timeLeft <= 0) { this.timeLeft = 0; this.endRound(); return; }

        // Heal debuff
        if (this.healDebuffTimer > 0) {
            this.healDebuffTimer -= dt;
            if (this.healDebuffTimer <= 0) { this.healMult = 1; this.healDebuffTxt.setVisible(false); }
            else this.healDebuffTxt.setText('\u26A0\uFE0F Heal reducido \u2014 ' + Math.ceil(this.healDebuffTimer) + 's').setVisible(true);
        }

        // Arrivals
        this.arrivalAccum += dt;
        if (this.arrivalAccum >= this.getArrivalInterval()) {
            const type = this.getClientType();
            if (this.procs[0].queue.length < CLIENT_MAX) {
                this.procs[0].queue.push({ type, age: 0 });
                this.roundArrived++;
                this.gs.totalArrived++;
                this.bounceQueueDot(0);
            } else {
                this.clientLost(0);
            }
            this.arrivalAccum = 0;
        }
        this.arrivalTxt.setAlpha(Math.sin(this.time.now / 400) * 0.3 + 0.7);

        // Process updates
        for (let i = 0; i < 5; i++) this.updateProcess(i, dt);

        // Boost investment
        if (this.investing >= 0 && !this.boostState[this.investing].done) {
            this.boostState[this.investing].progress += dt;
            if (this.boostState[this.investing].progress >= ROUND_BOOSTS[this.investing].investTime) {
                this.completeBoost(this.investing);
            }
        }

        // Events
        this.eventAccum += dt;
        const evtInt = this.getEventInterval();
        if (this.eventAccum >= evtInt && this.timeLeft > 15) {
            this.triggerEvent(); this.eventAccum = 0;
        }

        // HUD updates
        const secs = Math.ceil(this.timeLeft);
        this.timerTxt.setText(fmtTime(secs));
        if (secs <= 15) {
            const pulse = Math.sin(this.time.now / 200) * 0.5 + 0.5;
            const r = Math.round(200 + 55 * pulse);
            const gb = Math.round(20 + 40 * pulse);
            this.timerTxt.setColor(`rgb(${r}, ${gb}, ${gb})`);
            this.timerTxt.setScale(1 + pulse * 0.05);
        } else {
            this.timerTxt.setColor('#FFFFFF');
            this.timerTxt.setScale(1);
        }
        this.coinsTxt.setText('\u{1FA99} ' + this.gs.coins);
        this.scoreTxt.setText(String(this.roundScore));
        this.lostTxt.setText(String(this.roundLost));

        const tier = getComboTier(this.combo);

        // Combo meter bar
        this.comboBarGfx.clear();
        const meterX = 378, meterY = 52, meterW = 84, meterH = 4;
        this.comboBarGfx.fillStyle(0x654321, 0.5);
        this.comboBarGfx.fillRoundedRect(meterX, meterY, meterW, meterH, 2);
        let meterFill = 0, meterColor = 0x999999;
        if (tier.mult >= 3) { meterFill = 1; meterColor = 0xFF0000; }
        else if (tier.mult >= 2) { meterFill = 0.75; meterColor = 0xFFA500; }
        else if (tier.mult >= 1.5) { meterFill = 0.5; meterColor = 0xFFD700; }
        else { meterFill = Math.min(1, this.combo / 3) * 0.25; meterColor = 0x999999; }
        if (meterFill > 0) {
            this.comboBarGfx.fillStyle(meterColor, 1);
            this.comboBarGfx.fillRoundedRect(meterX, meterY, meterW * meterFill, meterH, 2);
        }

        // Combo display
        if (tier.mult >= 3) {
            const pulse = Math.sin(this.time.now / 250) * 0.08 + 1;
            this.comboTxt.setText('\u{1F525}\u{1F525}' + tier.label).setColor('#ff5722').setFontSize('22px').setScale(pulse);
            this.goldenTint.setAlpha(0.04 + Math.sin(this.time.now / 500) * 0.02);
        } else if (tier.mult >= 2) {
            const pulse = Math.sin(this.time.now / 400) * 0.04 + 1;
            this.comboTxt.setText('\u{1F525}' + tier.label).setColor('#ff9800').setFontSize('20px').setScale(pulse);
            this.goldenTint.setAlpha(0);
        } else if (tier.mult >= 1.5) {
            const pulse = Math.sin(this.time.now / 600) * 0.03 + 1;
            this.comboTxt.setText(tier.label).setColor('#ffc107').setFontSize('19px').setScale(pulse);
            this.goldenTint.setAlpha(0);
        } else {
            this.comboTxt.setText(tier.label).setColor('#FFFFFF').setFontSize('18px').setScale(1);
            this.goldenTint.setAlpha(0);
        }

        if (this.attending >= 0) this.statusTxt.setText('\u{1F527} Atendiendo: ' + PROC_DATA[this.attending].name).setColor('#228B22');
        else if (this.investing >= 0) this.statusTxt.setText('\u{1F477} Invirtiendo en: ' + ROUND_BOOSTS[this.investing].name + '...').setColor('#FF6B35');
        else this.statusTxt.setText('Click una estacion para atenderla').setColor('#654321');

        this.drawStations(); this.drawBoosts(); this.drawBossArea();
    }

    // ---- End round ----
    endRound() {
        if (this.ended) return;
        this.ended = true;

        // Quality bonus
        if (this.roundLost === 0) {
            this.gs.coins += COIN_QUALITY_BONUS;
            this.roundCoins += COIN_QUALITY_BONUS;
        }

        this.gs.totalScore += this.roundScore;
        let inPipeline = 0;
        this.procs.forEach(p => inPipeline += p.queue.length);

        this.gs.roundStats.push({
            round: this.round, score: this.roundScore, lost: this.roundLost,
            coins: this.roundCoins, maxCombo: this.maxCombo, arrived: this.roundArrived,
        });

        this.cameras.main.fadeOut(300, 0xC4, 0x95, 0x6A);
        this.time.delayedCall(300, () => {
            if (this.round < TOTAL_ROUNDS) {
                this.gs.round++;
                this.scene.start('ShopScene', { gameState: this.gs });
            } else {
                this.scene.start('EndScene', { gameState: this.gs });
            }
        });
    }
}

class ShopScene extends Phaser.Scene {
    constructor() { super('ShopScene'); }

    init(data) { this.gs = data.gameState; }

    create() {
        this.cameras.main.fadeIn(400, 0xC4, 0x95, 0x6A);

        drawWoodBackground(this);

        const lastRound = this.gs.roundStats[this.gs.roundStats.length - 1];

        // Header
        const headerGfx = this.add.graphics().setDepth(1);
        headerGfx.fillStyle(0x654321, 1); headerGfx.fillRect(0, 0, W, 90);
        headerGfx.lineStyle(2, 0x8B4513, 1); headerGfx.lineBetween(0, 90, W, 90);

        this.add.text(W / 2, 22, 'DIA ' + lastRound.round + ' COMPLETADO', {
            fontSize: '26px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#FFD700', fontStyle: 'bold',
            stroke: '#1a1a1a', strokeThickness: 3
        }).setOrigin(0.5).setDepth(2);

        // Round stats
        const statsPanel = this.add.graphics().setDepth(1);
        statsPanel.fillStyle(0x8B6847, 0.6); statsPanel.fillRoundedRect(W / 2 - 280, 48, 560, 28, 8);

        const statsLine = [
            'Exitosos: ' + lastRound.score,
            'Perdidos: ' + lastRound.lost,
            'Combo max: x' + getComboTier(lastRound.maxCombo).mult,
            'Coins: +' + lastRound.coins + (lastRound.lost === 0 ? ' (+10 bonus!)' : ''),
        ].join('    |    ');
        this.add.text(W / 2, 62, statsLine, {
            fontSize: '11px', fontFamily: 'Arial, sans-serif', color: '#D2B48C'
        }).setOrigin(0.5).setDepth(2);

        // Balance
        this.balanceTxt = this.add.text(W / 2, 120, '\u{1FA99} Balance: ' + this.gs.coins + ' coins', {
            fontSize: '20px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#FFD700', fontStyle: 'bold',
            stroke: '#1a1a1a', strokeThickness: 3
        }).setOrigin(0.5).setDepth(2);

        this.add.text(W / 2, 155, 'TIENDA DE MEJORAS', {
            fontSize: '14px', fontFamily: 'Arial, sans-serif', color: '#8B6847', letterSpacing: 2
        }).setOrigin(0.5).setDepth(2);

        // Upgrade cards - 2 columns x 4 rows (portrait layout)
        this.cardGfx = [];
        this.cardLabels = [];
        const COL_X = [W / 2 - 140, W / 2 + 140];
        const ROW_Y = [240, 380, 520, 660];
        const CW = 240, CH = 115;

        for (let j = 0; j < UPGRADES.length; j++) {
            const u = UPGRADES[j];
            // Map to 2-column layout
            const col = j % 2;
            const row = Math.floor(j / 2);
            const cx = COL_X[col];
            const cy = ROW_Y[row];
            const owned = !!this.gs.upgrades[u.id];
            const canAfford = this.gs.coins >= u.price;

            const g = this.add.graphics().setDepth(1);
            this.cardGfx.push(g);

            this.drawCard(g, cx, cy, CW, CH, u, owned, canAfford);

            this.add.text(cx, cy - 32, u.emoji, { fontSize: '24px' }).setOrigin(0.5).setDepth(2);
            this.add.text(cx, cy - 4, u.name, {
                fontSize: '12px', fontFamily: 'Arial, sans-serif', color: owned ? '#228B22' : '#1a1a1a', fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(2);
            this.add.text(cx, cy + 16, u.desc, {
                fontSize: '9px', fontFamily: 'Arial, sans-serif', color: '#555555', align: 'center', lineSpacing: 2
            }).setOrigin(0.5).setDepth(2);

            const priceTxt = this.add.text(cx, cy + 42, owned ? '\u2705 Comprado' : '\u{1FA99} ' + u.price, {
                fontSize: '11px', fontFamily: 'Arial, sans-serif',
                color: owned ? '#228B22' : (canAfford ? '#8B6914' : '#CC0000'), fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(2);
            this.cardLabels.push(priceTxt);

            if (!owned && canAfford) {
                const zone = this.add.zone(cx, cy, CW, CH).setInteractive({ useHandCursor: true }).setDepth(5);
                zone.on('pointerdown', () => this.buyUpgrade(j));
            }
        }

        // Next day button
        const nextRound = this.gs.round;
        this.makeBtn(W / 2, 780, 'SIGUIENTE DIA  \u2192  Dia ' + nextRound, () => {
            this.cameras.main.fadeOut(300, 0xC4, 0x95, 0x6A);
            this.time.delayedCall(300, () => {
                this.scene.start('GameScene', { gameState: this.gs });
            });
        });
    }

    drawCard(g, cx, cy, cw, ch, u, owned, canAfford) {
        const hw = cw / 2, hh = ch / 2;
        let bg, brd, brdW;
        if (owned) { bg = 0xF5F5F5; brd = 0x4caf50; brdW = 3; }
        else if (canAfford) { bg = 0xFFFFFF; brd = 0x1F77B4; brdW = 2; }
        else { bg = 0xE0E0E0; brd = 0x999999; brdW = 1; }
        g.fillStyle(bg, 1); g.fillRoundedRect(cx - hw, cy - hh, cw, ch, 10);
        g.lineStyle(brdW, brd, 1); g.strokeRoundedRect(cx - hw, cy - hh, cw, ch, 10);
    }

    buyUpgrade(idx) {
        const u = UPGRADES[idx];
        if (this.gs.upgrades[u.id] || this.gs.coins < u.price) return;
        this.gs.coins -= u.price;
        this.gs.upgrades[u.id] = true;
        this.scene.restart({ gameState: this.gs });
    }

    makeBtn(x, y, label, fn) {
        const c = this.add.container(x, y).setDepth(3);
        const bg = this.add.graphics();
        const draw = (f, s) => {
            bg.clear(); bg.fillStyle(f, 1); bg.fillRoundedRect(-150, -26, 300, 52, 12);
            bg.lineStyle(2, s, 1); bg.strokeRoundedRect(-150, -26, 300, 52, 12);
        };
        draw(0x32CD32, 0x228B22);
        const t = this.add.text(0, 0, label, {
            fontSize: '16px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#1a1a1a', fontStyle: 'bold'
        }).setOrigin(0.5);
        c.add([bg, t]).setSize(300, 52).setInteractive({ useHandCursor: true });
        c.on('pointerover', () => { draw(0x3DE03D, 0x228B22); c.setScale(1.05); });
        c.on('pointerout', () => { draw(0x32CD32, 0x228B22); c.setScale(1); });
        c.on('pointerdown', fn);
    }
}

// ===================================================================
// END SCENE
// ===================================================================

class EndScene extends Phaser.Scene {
    constructor() { super('EndScene'); }
    init(data) { this.gs = data.gameState; }

    create() {
        this.cameras.main.fadeIn(500, 0xC4, 0x95, 0x6A);

        const d = this.gs;

        drawWoodBackground(this);

        this.add.text(W / 2, 50, 'FIN DEL JUEGO', {
            fontSize: '36px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#FFD700', fontStyle: 'bold',
            stroke: '#1a1a1a', strokeThickness: 4
        }).setOrigin(0.5).setDepth(2);

        // Big score
        const bigScore = this.add.text(W / 2, 130, String(d.totalScore), {
            fontSize: '60px', fontFamily: 'Arial Black, Arial, sans-serif', color: '#FFD700', fontStyle: 'bold',
            stroke: '#1a1a1a', strokeThickness: 5
        }).setOrigin(0.5).setDepth(2);
        bigScore.setScale(0.5).setAlpha(0);
        this.tweens.add({ targets: bigScore, scaleX: 1, scaleY: 1, alpha: 1, duration: 500, ease: 'Back.easeOut' });

        this.add.text(W / 2, 175, 'CLIENTES EXITOSOS EN 8 DIAS', {
            fontSize: '11px', fontFamily: 'Arial, sans-serif', color: '#8B6847', letterSpacing: 2
        }).setOrigin(0.5).setDepth(2);

        // Stats
        const upgradeCount = Object.keys(d.upgrades).length;
        const bestRound = d.roundStats.reduce((a, b) => a.score > b.score ? a : b);
        const totalCoins = d.roundStats.reduce((sum, r) => sum + r.coins, 0);
        const maxCombo = Math.max(...d.roundStats.map(r => r.maxCombo));

        const sy = 220;
        const statsPanel = this.add.graphics().setDepth(1);
        statsPanel.fillStyle(0xFFFFFF, 0.7);
        statsPanel.fillRoundedRect(W / 2 - 260, sy - 18, 520, 210, 12);
        statsPanel.lineStyle(1, 0xD2B48C, 1);
        statsPanel.strokeRoundedRect(W / 2 - 260, sy - 18, 520, 210, 12);

        const stats = [
            ['Clientes que llegaron', d.totalArrived, '#555555'],
            ['Clientes perdidos', d.totalLost, d.totalLost > 0 ? '#CC0000' : '#228B22'],
            ['Coins ganados total', totalCoins, '#8B6914'],
            ['Upgrades comprados', upgradeCount + '/8', '#1F77B4'],
            ['Mejor dia', 'Dia ' + bestRound.round + ' (' + bestRound.score + ' exitosos)', '#228B22'],
            ['Combo maximo', 'x' + getComboTier(maxCombo).mult + ' (' + maxCombo + ' seguidos)', '#FF6B35'],
        ];
        stats.forEach(([label, val, color], i) => {
            this.add.text(W / 2 - 200, sy + i * 32, label, {
                fontSize: '13px', fontFamily: 'Arial, sans-serif', color: '#333333'
            }).setOrigin(0, 0.5).setDepth(2);
            this.add.text(W / 2 + 200, sy + i * 32, String(val), {
                fontSize: '14px', fontFamily: 'Arial Black, Arial, sans-serif', color, fontStyle: 'bold'
            }).setOrigin(1, 0.5).setDepth(2);
        });

        // Message
        let msg;
        if (d.totalScore >= 80) msg = 'Maestro/a del flywheel. Encontraste el balance perfecto entre operar e invertir.';
        else if (d.totalScore >= 55) msg = 'Buen manejo operativo. Tu equipo CS estaria orgulloso.';
        else if (d.totalScore >= 35) msg = 'Sobreviviste los 8 dias. Las mejoras hicieron la diferencia.';
        else if (d.totalScore >= 20) msg = 'Dia dificil. Invertir temprano en upgrades es clave.';
        else msg = 'Semana complicada. Tip: compra auto-heal temprano para liberar tiempo.';

        this.add.text(W / 2, 460, msg, {
            fontSize: '15px', fontFamily: 'Arial, sans-serif', color: '#1a1a1a',
            fontStyle: 'italic', align: 'center', wordWrap: { width: 500 }
        }).setOrigin(0.5).setDepth(2);

        // Lesson
        let lesson;
        if (upgradeCount === 0) lesson = 'Sin proyectos, las operaciones colapsan. La inversion en mejoras no es opcional.';
        else if (upgradeCount >= 5 && d.totalScore >= 50) lesson = 'Los proyectos liberaron capacidad. Asi funciona el flywheel en la vida real.';
        else if (upgradeCount >= 4 && d.totalScore < 25) lesson = 'Muchos upgrades pero pocos resultados. El timing de las compras importa.';
        else lesson = 'Cada mejora reduce la carga operativa. El equilibrio entre operar e invertir es el flywheel de CS.';

        this.add.text(W / 2, 510, lesson, {
            fontSize: '11px', fontFamily: 'Arial, sans-serif', color: '#8B6847', align: 'center', wordWrap: { width: 500 }
        }).setOrigin(0.5).setDepth(2);

        // Flywheel banner
        const fg = this.add.graphics().setDepth(1);
        fg.fillStyle(0x8B4513, 1); fg.fillRoundedRect(W / 2 - 280, 560, 560, 36, 8);
        fg.lineStyle(1, 0x654321, 1); fg.strokeRoundedRect(W / 2 - 280, 560, 560, 36, 8);
        this.add.text(W / 2, 578, '\u{1F504}  Mas exitos \u2192 Menor riesgo \u2192 Mejor tasa \u2192 Mas acceso \u2192 Mas clientes \u2192 Loop', {
            fontSize: '10px', fontFamily: 'Arial, sans-serif', color: '#FFD700', fontStyle: 'italic'
        }).setOrigin(0.5).setDepth(2);

        // Upgrades purchased
        if (upgradeCount > 0) {
            const upEmojis = UPGRADES.filter(u => d.upgrades[u.id]).map(u => u.emoji + ' ' + u.name).join('   ');
            this.add.text(W / 2, 620, 'Mejoras compradas: ' + upEmojis, {
                fontSize: '10px', fontFamily: 'Arial, sans-serif', color: '#228B22',
                wordWrap: { width: 500 }, align: 'center'
            }).setOrigin(0.5).setDepth(2);
        }

        // Workers celebration row
        const celebGfx = this.add.graphics().setDepth(1);
        for (let i = 0; i < 5; i++) {
            const wx = 110 + i * 110;
            const wy = 700;
            const armOff = Math.sin(Date.now() / 200 + i) * 6;
            drawWorker(celebGfx, wx, wy, WORKER_SHIRTS[i], WORKER_SKINS[i], WORKER_HAIR[i], armOff, 0);
        }

        // Buttons
        this.makeBtn(W / 2 - 130, 790, 'Compartir', () => this.share());
        this.makeBtn(W / 2 + 130, 790, 'Jugar de nuevo', () => {
            this.cameras.main.fadeOut(300, 0xC4, 0x95, 0x6A);
            this.time.delayedCall(300, () => this.scene.start('MenuScene'));
        });
    }

    makeBtn(x, y, label, fn) {
        const c = this.add.container(x, y).setDepth(3);
        const bg = this.add.graphics();
        const draw = (f, s) => {
            bg.clear(); bg.fillStyle(f, 1); bg.fillRoundedRect(-105, -24, 210, 48, 10);
            bg.lineStyle(2, s, 1); bg.strokeRoundedRect(-105, -24, 210, 48, 10);
        };
        draw(0x32CD32, 0x228B22);
        const t = this.add.text(0, 0, label, {
            fontSize: '14px', fontFamily: 'Arial, sans-serif', color: '#1a1a1a', fontStyle: 'bold'
        }).setOrigin(0.5);
        c.add([bg, t]).setSize(210, 48).setInteractive({ useHandCursor: true });
        c.on('pointerover', () => { draw(0x3DE03D, 0x228B22); c.setScale(1.05); });
        c.on('pointerout', () => { draw(0x32CD32, 0x228B22); c.setScale(1); });
        c.on('pointerdown', fn);
    }

    share() {
        const d = this.gs;
        const maxCombo = Math.max(...d.roundStats.map(r => r.maxCombo));
        const txt = [
            'Un Dia en Ops v2 \u2014 Duppla',
            `Clientes exitosos: ${d.totalScore} en 8 dias`,
            `Perdidos: ${d.totalLost}`,
            `Upgrades: ${Object.keys(d.upgrades).length}/8`,
            `Combo max: x${getComboTier(maxCombo).mult}`,
            '',
            d.totalScore >= 80 ? 'Maestro/a del flywheel' :
            d.totalScore >= 55 ? 'Buen manejo operativo' :
            d.totalScore >= 35 ? 'Sobrevivi los 8 dias' : 'Semana complicada...',
        ].join('\n');
        if (navigator.share) navigator.share({ text: txt }).catch(() => this.copyTxt(txt));
        else this.copyTxt(txt);
    }

    copyTxt(txt) {
        if (navigator.clipboard) navigator.clipboard.writeText(txt).then(
            () => this.toast('Copiado al portapapeles'), () => this.toast('No se pudo copiar'));
        else this.toast('Clipboard no disponible');
    }

    toast(msg) {
        const t = this.add.text(W / 2, 850, msg, {
            fontSize: '13px', fontFamily: 'Arial, sans-serif', color: '#228B22'
        }).setOrigin(0.5).setDepth(5);
        this.tweens.add({ targets: t, alpha: 0, y: 835, duration: 1500, onComplete: () => t.destroy() });
    }
}

// ===================================================================
// BOOT
// ===================================================================

new Phaser.Game({
    type: Phaser.AUTO,
    width: W, height: H,
    backgroundColor: '#C4956A',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: [MenuScene, GameScene, ShopScene, EndScene]
});

</script>
</body>
</html>
