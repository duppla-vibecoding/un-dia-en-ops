<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 60" width="40" height="60">
  <!-- Client Complicado - Mini chibi (gold/dark, arms crossed, annoyed) -->

  <!-- Shadow -->
  <ellipse cx="20" cy="58" rx="10" ry="2" fill="rgba(0,0,0,0.15)"/>

  <!-- Legs (standing firm) -->
  <rect x="12" y="42" width="6" height="12" rx="3" fill="#444"/>
  <rect x="22" y="42" width="6" height="12" rx="3" fill="#444"/>
  <!-- Shoes -->
  <rect x="10" y="52" width="9" height="5" rx="2" fill="#333"/>
  <rect x="21" y="52" width="9" height="5" rx="2" fill="#333"/>

  <!-- Body (dark outfit - difficult person) -->
  <rect x="10" y="28" width="20" height="18" rx="4" fill="#5D4037"/>

  <!-- Arms CROSSED (key visual = difficult client) -->
  <rect x="8" y="32" width="24" height="6" rx="3" fill="#5D4037"/>
  <!-- Hands visible at crossing point -->
  <circle cx="12" cy="35" r="2.5" fill="#D4A574"/>
  <circle cx="28" cy="35" r="2.5" fill="#D4A574"/>

  <!-- Head -->
  <rect x="6" y="2" width="28" height="28" rx="6" fill="#D4A574"/>

  <!-- Hair (neat but stern) -->
  <rect x="6" y="0" width="28" height="10" rx="5" fill="#222"/>

  <!-- Eyes (narrowed, unimpressed) -->
  <ellipse cx="14" cy="16" rx="5" ry="4" fill="#FFF"/>
  <ellipse cx="26" cy="16" rx="5" ry="4" fill="#FFF"/>
  <!-- Pupils (side-eye / judging) -->
  <circle cx="16" cy="17" r="2.5" fill="#333"/>
  <circle cx="28" cy="17" r="2.5" fill="#333"/>

  <!-- Eyebrows (furrowed, annoyed V shape) -->
  <rect x="8" y="9" width="10" height="3" rx="1" fill="#222" transform="rotate(-12, 13, 10)"/>
  <rect x="22" y="9" width="10" height="3" rx="1" fill="#222" transform="rotate(12, 27, 10)"/>

  <!-- Mouth (frown / displeased) -->
  <path d="M14 25 Q20 22 26 25" fill="none" stroke="#795548" stroke-width="2" stroke-linecap="round"/>

  <!-- Speech/thought indicators (... = impatient) -->
  <circle cx="34" cy="8" r="1.5" fill="#999"/>
  <circle cx="37" cy="5" r="1.2" fill="#999"/>
  <circle cx="39" cy="2" r="1" fill="#999"/>
</svg>